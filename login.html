<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - RMS Admin</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-typography">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
<style data-purpose="background-styling">
    .bg-main-overlay {
      background-color: #eef2f6;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(255,255,255,0.6) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(255,255,255,0.6) 0%, transparent 40%),
        radial-gradient(circle at 80% 10%, rgba(226,232,240,0.5) 0%, transparent 50%),
        radial-gradient(circle at 20% 90%, rgba(226,232,240,0.5) 0%, transparent 50%);
    }
  </style>
</head>
<body class="bg-main-overlay min-h-screen flex items-center justify-center p-4">
<!-- BEGIN: LoginCard -->
<main class="w-full max-w-lg" data-purpose="login-container">
<div class="bg-white rounded-xl shadow-[0_20px_50px_-12px_rgba(0,0,0,0.1)] p-8 md:p-12 border border-transparent">
<!-- BEGIN: LogoSection -->
<div class="flex flex-col items-center mb-8" data-purpose="header-section">
<div class="mb-4">
<!-- Logo -->
<div class="bg-[#1e40af] p-3 rounded-xl inline-flex items-center space-x-3">
<div class="bg-white p-1.5 rounded-md"><svg class="w-5 h-5 text-[#1e40af]" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg></div>
<span class="text-white text-lg font-bold tracking-tight">RMS Admin</span>
</div>
</div>
<h1 class="text-[32px] font-bold text-gray-800 mt-3">Welcome Back</h1>
</div>
<!-- END: LogoSection -->
<!-- BEGIN: LoginForm -->
<form action="#" class="space-y-6" method="POST">
<!-- Email Input Group -->
<div data-purpose="email-field">
<label class="block text-sm font-semibold text-[#334155] mb-1.5" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
<!-- Envelope Icon -->
<svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<input class="block w-full pl-11 pr-4 py-2.5 bg-white border border-gray-300 rounded-lg text-gray-900 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors" id="email" name="email" placeholder="your.email@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Input Group -->
<div data-purpose="password-field">
<label class="block text-sm font-semibold text-[#334155] mb-1.5" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
<!-- Lock Icon -->
<svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<input class="block w-full pl-11 pr-4 py-2.5 bg-white border border-gray-300 rounded-lg text-gray-900 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors" id="password" name="password" placeholder="********" required="" type="password"/>
</div>
</div>
<!-- Options: Remember Me & Forgot Password -->
<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-gray-700" for="remember-me">Remember me</label>
</div>
<div class="text-sm">
<a class="font-semibold text-[#1e40af] hover:text-blue-500 transition-colors" href="#">Forgot Password?</a>
</div>
</div>
<!-- Sign In Button -->
<div data-purpose="submit-button">
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-base font-semibold text-white bg-[#1e40af] hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all duration-200" type="submit">
            Sign In
          </button>
</div>
</form>
<!-- END: LoginForm -->
<!-- BEGIN: Footer -->
<div class="mt-8 text-center" data-purpose="card-footer">
<p class="text-sm text-gray-500">
          Don't have an account? <a class="text-gray-600 hover:underline" href="#">Contact your administrator.</a>
</p>
</div>
<!-- END: Footer -->
</div>
</main>
<!-- END: LoginCard -->
</body></html>
